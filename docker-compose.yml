services:
  dashboard:
    build: .
    ports:
      - "3000:3000"
    environment:
      MQTT_BROKER_URL: mqtt://broker:1883
    depends_on:
      - broker

  broker:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
